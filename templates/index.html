<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style2/style.css') }}">

</head>
<body>
    <div class="container">
        
        <h1>Meine Quizfragen</h1>
        <a href="templates/quiz.html" target="_blank">Quiz beantworten</a>

        <a href="{{ url_for('quiz') }}" class="btn btn-warning mb-3">Quiz beantworten</a>

        <!-- Formular -->
        <div class="card">
            <div class="card-body">
                <h5>Neue Frage hinzufugen</h5>
                <form action="{{ url_for('add_post') }}" method="POST">
                    <div class="row">
                        <div class="col-md-6">
                            <input type="text" name="quiz_titel" class="form-control" placeholder="Titel" required>
                        </div>
                        <div class="col-md-6">
                            <input type="text" name="frage1" class="form-control" placeholder="Frage 1" required>
                        </div>
                        <div class="col-md-6">
                            <input type="text" name="antwort1" class="form-control" placeholder="Antwort 1" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <input type="text" name="frage2" class="form-control" placeholder="Frage 2" required>
                        </div>
                        <div class="col-md-6">
                            <input type="text" name="antwort2" class="form-control" placeholder="Antwort 2" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning mt-2">Speichern</button>
                </form>
            </div>
        </div>

        <!-- Tabelle -->
        <div class="card">
            <div class="card-body">
                
                
                {% if text_quiz|length == 0 %}
                    <p>Noch keine Fragen vorhanden.</p>
                {% else %}
                    
                    
                    {% for quiz in text_quiz %}
                    <div class="card mb-3" style="width: 18rem;">
                        <div class="card-body">
                            <h5 class="card-title">{{ quiz['quiz_titel'] }}</h5>
                            <p class="card-text">Klicke hier um die Fragen und Antworten des Quizes zu sehen!</p>
                            <a href="#" class="btn btn-primary">Mehr lesen</a>
                            <form action="{{ url_for('delete_post', id=quiz['Id']) }}" method="POST" style="display:inline;">
                                <button type="submit" class="btn btn-danger" onclick="return confirm('Mochtest du dieses Quiz wirklich loschen?')">Loschen</button>
                            </form>
                        </div>
                    </div>
                    {% endfor %}
                {% endif %}
            </div>
        </div>

    </div>
</body>
</html>
