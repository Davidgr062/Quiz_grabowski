<!DOCTYPE html>
<html lang="de">
<head>

            margin-top: 100px;
        }
        h1 {
            color: #f8f9fa;
        }
        p {
            color: #adb5bd;
        }
        button {
            padding: 10px 20px;

            background-color: #0d6efd;
            color: white;
            border: none;

            cursor: pointer;
        }

        .nav-links a {

            color: #0d6efd;

<body>

    <h1>Hello World 👋</h1>
    <p>Das ist meine erste Website.</p>

    <button onclick="zeigeNachricht()">Klick mich</button>

        function zeigeNachricht() {
            alert("Willkommen auf meiner Website!");
        }
    </script>

    <div class="nav-links">
        <a href="{{ url_for('schüler') }}">Als Schüler fortfahren</a>
