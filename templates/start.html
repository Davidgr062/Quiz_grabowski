<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Quiz Start</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style2/style.css') }}">

<style>

body{
    background-color:#086ee9;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#086ee9;
    border:2px solid black;
    border-radius:10px;
    width:400px;
    padding:30px;
    text-align:center;
}

h1{
    margin-bottom:10px;
}

p{
    margin-bottom:25px;
}

.btn-rollen{
    display:block;
    width:100%;
    margin:10px 0;
    padding:12px;
    border-radius:6px;
    text-decoration:none;
    border:2px solid black;
}

.btn-lehrer{
    background:#0d6efd;
    color:white;
}

.btn-schueler{
    background:#ffc107;
    color:black;
}
</style>
</head>

<body>

<div class="container">
    <h1>Willkommen zum Quiz</h1>
    <p>Wie möchtest du fortfahren?</p>

    <a href="{{ url_for('index') }}" class="btn-rollen btn-lehrer">
        Als Lehrer fortfahren
    </a>

    <a href="{{ url_for('schueler') }}" class="btn-rollen btn-schueler">
        Als Schüler fortfahren
    </a>
    {% if rolle == "S"%}
        
    {% endif %}
</div>

</body>
</html>
