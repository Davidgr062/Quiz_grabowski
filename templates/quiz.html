<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style2/style.css') }}">
 
</head>
<body>
    <div class="container">
       
        <h1>Meine Quizfragen</h1>
        <a href="{{ url_for('start') }}" class="btn btn-secondary mb-3">Zurück zur Startseite</a>
        

        <a href="{{ url_for('quiz') }}" class="btn btn-warning mb-3">Quiz beantworten</a>
                   
                    {% for quiz in text_quiz %}
                        <div class="card mb-3" style="width: 18rem;">
                        <div class="card-body">
                        <h5 class="card-title">{{ quiz['quiz_titel'] }}</h5>
                        <p class="card-text">Klicke hier um die Fragen und Antworten des Quizes zu sehen!</p>
                        <form action="{{ url_for('delete_post', id=quiz['Id']) }}" method="POST">
                        <button type="submit" class="btn btn-danger">Löschen</button>
                        </form>
                        </div>
                        </div>
                    {% endfor %}
                
            </div>
        </div>
 
    </div>
</body>
</html>
